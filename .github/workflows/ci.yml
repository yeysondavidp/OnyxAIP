name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: Pint · Larastan · Pest
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: onyx_aip_test
          MYSQL_USER: onyx_aip
          MYSQL_PASSWORD: secret
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, mbstring, bcmath, pcntl, intl, zip, gd, exif, redis
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Security audit
        run: composer audit --no-dev

      - name: Style check (Pint)
        run: ./vendor/bin/pint --test

      - name: Static analysis (Larastan level 5)
        run: ./vendor/bin/phpstan analyse

      - name: Tests (Pest)
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: onyx_aip_test
          DB_USERNAME: onyx_aip
          DB_PASSWORD: secret
          QUEUE_CONNECTION: sync
          CACHE_STORE: array
          SESSION_DRIVER: array
        run: ./vendor/bin/pest --ci
