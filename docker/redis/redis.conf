# ONYX AIP — Redis configuration
# Owned by this project; shared network so other projects can adopt it.
# See ADR-002 for rationale and namespacing rules.

# ---- Persistence: AOF (append-only file) -------------------
# Queued jobs and sessions must survive a container restart.
appendonly yes
appendfsync everysec

# ---- Eviction: none ----------------------------------------
# noeviction means Redis errors on new writes when full rather
# than silently dropping queue/session keys. Alert before this
# fires (US-00.7). Raise maxmemory before it becomes a problem.
maxmemory 256mb
maxmemory-policy noeviction

# ---- Namespacing -------------------------------------------
# ONYX AIP uses logical DB 0 (queue + general) and DB 1 (cache).
# Other adopters on this shared instance pick different DB indices.
# Key prefix is set in .env as REDIS_PREFIX=onyx_aip_

# ---- Bind to all interfaces (inside Docker network only) ---
bind 0.0.0.0

# ---- Disable dangerous commands ----------------------------
rename-command FLUSHALL ""
rename-command CONFIG   ""
rename-command DEBUG    ""
