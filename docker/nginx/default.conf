server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Never serve storage/ directly — files go through signed URLs only (§14.3)
    location ^~ /storage/ {
        return 403;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    # Static assets — long cache, immutable for Vite-fingerprinted files
    location ~* \.(css|js|woff2?|ttf|otf|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Deny hidden files (e.g. .env)
    location ~ /\. {
        deny all;
    }
}
